  </text>

  <text x="400" y="675" fill="url(#accent)" font-size="40" font-weight="800" font-family="Montserrat, Arial, sans-serif" text-anchor="middle">10 000 so&apos;m</text>

  <text x="400" y="730" fill="rgba(255,255,255,0.45)" font-size="18" font-family="Montserrat, Arial, sans-serif" text-anchor="middle">IKKI DO'ST • QR MENU</text>
