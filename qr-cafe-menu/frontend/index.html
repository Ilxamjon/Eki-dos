<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="description"
        content="Ikki Do'st qahvaxonasi uchun maxsus tayyorlangan, tezkor va interaktiv mobil QR Menyu.">
    <meta property="og:title" content="QR Menu - Ikki Do'st">
    <meta property="og:description" content="Dildan suhbat va mazali taomlar.">
    <meta property="og:type" content="website">
    <title>QR Menu - Ikki Do'st</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Montserrat:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <meta name="description" content="QR Menu for Premium Cafe">
</head>

<body class="welcome-page">
    <div class="welcome-container">
        <div class="logo-area">
            <h1 class="brand-title">IKKI DO'ST</h1>
            <p class="brand-subtitle">Dildan suhbat va mazali taomlar</p>
        </div>

        <div class="table-selection-card">
            <h2>Xush kelibsiz!</h2>
            <p>Iltimos, stol raqamini kiriting va menyuni ko'rib chiqing.</p>

            <form id="welcomeForm" class="welcome-form">
                <div class="input-group">
                    <label for="tableNumber">Stol raqami (1 - 30)</label>
                    <input type="number" id="tableNumber" min="1" max="30" placeholder="Masalan: 5" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Menyuni ochish <span
                        class="arrow">→</span></button>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
