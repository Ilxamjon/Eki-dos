<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Ikki Do'st rasmiy menyusi. Barcha premium ovqatlar va haqiqiy shashliklar.">
    <title>Menyu - Ikki Do'st</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Montserrat:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header class="app-header">
        <div class="header-content">
            <h1 class="header-brand">IKKI DO'ST</h1>
        </div>
        <div class="categories-wrapper">
            <button class="cat-arrow cat-arrow-left" type="button" aria-label="Chapga siljit" data-dir="-1">‹</button>
            <button class="category-btn active cat-all" data-category="all">Barchasi</button>
            <div class="categories-scroll" id="categoriesContainer" aria-label="Kategoriyalar">
                <button class="category-btn" data-category="Bluda">Bluda</button>
                <button class="category-btn" data-category="Zakuska">Zakuska</button>
                <button class="category-btn" data-category="Ichimliklar">Ichimliklar</button>
                <button class="category-btn" data-category="Extra">Extra</button>
            </div>
            <button class="cat-arrow cat-arrow-right" type="button" aria-label="O'ngga siljit" data-dir="1">›</button>
        </div>
    </header>

    <main class="menu-container pb-100">
        <div id="loader" class="loader-container">
            <div class="spinner"></div>
            <p>Menyu yuklanmoqda...</p>
        </div>

        <div id="menuGrid" class="menu-grid" style="display: none;">
            <!-- Menu items will be injected here via JS -->
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="js/app.js"></script>
</body>

</html>
